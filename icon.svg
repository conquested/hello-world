<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>

    <!-- Money crosshatch texture -->
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="5" height="5">
      <line x1="0" y1="5" x2="5" y2="0" stroke="#2E7A48" stroke-width="0.75" opacity="0.85"/>
      <line x1="-1" y1="1" x2="1" y2="-1" stroke="#2E7A48" stroke-width="0.75" opacity="0.85"/>
      <line x1="4" y1="6" x2="6" y2="4" stroke="#2E7A48" stroke-width="0.75" opacity="0.85"/>
    </pattern>

    <!-- V body green -->
    <linearGradient id="vGreen" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#3E9060"/>
      <stop offset="45%"  stop-color="#2B6844"/>
      <stop offset="100%" stop-color="#193C28"/>
    </linearGradient>

    <!-- Gold engraving gradient -->
    <linearGradient id="goldG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5E080"/>
      <stop offset="30%"  stop-color="#D4A830"/>
      <stop offset="65%"  stop-color="#B88018"/>
      <stop offset="100%" stop-color="#7A5808"/>
    </linearGradient>

    <!-- $100-ribbon iridescent: blue → teal → gold → copper → blue -->
    <linearGradient id="irid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1050A8"/>
      <stop offset="14%"  stop-color="#0090B8"/>
      <stop offset="28%"  stop-color="#00B898"/>
      <stop offset="44%"  stop-color="#D4A828"/>
      <stop offset="58%"  stop-color="#C07828"/>
      <stop offset="74%"  stop-color="#0090B8"/>
      <stop offset="88%"  stop-color="#1868C0"/>
      <stop offset="100%" stop-color="#C8A030"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropshadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.75"/>
    </filter>

    <!-- Glow on ribbon -->
    <filter id="glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ═══════════ LEFT ARM ═══════════ -->

  <!-- Outer black body (shadow layer) -->
  <polygon points="2,4 36,4 52,92 37,92"
           fill="#060606" filter="url(#dropshadow)"/>
  <!-- Gold outer border -->
  <polygon points="3,5 35,5 51,91 38,91"
           fill="none" stroke="url(#goldG)" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Green body -->
  <polygon points="7,9 31,9 49,87 41,87" fill="url(#vGreen)"/>
  <!-- Crosshatch overlay -->
  <polygon points="7,9 31,9 49,87 41,87" fill="url(#hatch)"/>
  <!-- Inner engraving line -->
  <polygon points="9,11 29,11 47,84 42,84"
           fill="none" stroke="#D4A83055" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- Top edge highlight -->
  <line x1="7" y1="9" x2="30" y2="9" stroke="#90D8A8" stroke-width="0.9" opacity="0.35"/>

  <!-- ═══════════ RIGHT ARM ═══════════ -->

  <polygon points="98,4 64,4 48,92 63,92"
           fill="#060606" filter="url(#dropshadow)"/>
  <polygon points="97,5 65,5 49,91 62,91"
           fill="none" stroke="url(#goldG)" stroke-width="2.2" stroke-linejoin="round"/>
  <polygon points="93,9 69,9 51,87 59,87" fill="url(#vGreen)"/>
  <polygon points="93,9 69,9 51,87 59,87" fill="url(#hatch)"/>
  <polygon points="91,11 71,11 53,84 58,84"
           fill="none" stroke="#D4A83055" stroke-width="0.7" stroke-linejoin="round"/>
  <line x1="93" y1="9" x2="70" y2="9" stroke="#90D8A8" stroke-width="0.9" opacity="0.35"/>

  <!-- ═══════════ SCROLL BANNER ═══════════ -->

  <!-- Drop shadow for whole banner -->
  <rect x="3" y="36" width="94" height="20" rx="2"
        fill="#000" opacity="0.45" transform="translate(1,3)"/>

  <!-- Left scroll curl (behind banner) -->
  <ellipse cx="3" cy="46" rx="6.5" ry="12" fill="#080808"/>
  <ellipse cx="3" cy="46" rx="5.5" ry="10" fill="url(#irid)" opacity="0.78" filter="url(#glow)"/>
  <ellipse cx="3" cy="46" rx="6.5" ry="12" fill="none" stroke="url(#goldG)" stroke-width="1.3"/>
  <!-- Left scroll inner line -->
  <ellipse cx="3" cy="46" rx="4" ry="7.5" fill="none" stroke="#F5E08035" stroke-width="0.6"/>

  <!-- Right scroll curl (behind banner) -->
  <ellipse cx="97" cy="46" rx="6.5" ry="12" fill="#080808"/>
  <ellipse cx="97" cy="46" rx="5.5" ry="10" fill="url(#irid)" opacity="0.78" filter="url(#glow)"/>
  <ellipse cx="97" cy="46" rx="6.5" ry="12" fill="none" stroke="url(#goldG)" stroke-width="1.3"/>
  <ellipse cx="97" cy="46" rx="4" ry="7.5" fill="none" stroke="#F5E08035" stroke-width="0.6"/>

  <!-- Banner main body -->
  <rect x="3" y="36" width="94" height="20" rx="1.5" fill="#0C0C0C"/>
  <rect x="3" y="36" width="94" height="20" rx="1.5" fill="url(#irid)" opacity="0.92" filter="url(#glow)"/>

  <!-- Gold border on banner -->
  <rect x="3" y="36" width="94" height="20" rx="1.5"
        fill="none" stroke="url(#goldG)" stroke-width="1.5"/>
  <!-- Inner engraving border -->
  <rect x="5.5" y="38.5" width="89" height="15" rx="1"
        fill="none" stroke="#F5E08030" stroke-width="0.6"/>
  <!-- Top sheen -->
  <rect x="4" y="37" width="92" height="7" rx="1" fill="white" opacity="0.055"/>

</svg>
