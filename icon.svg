<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>

    <linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#52C878"/>
      <stop offset="50%"  stop-color="#237A42"/>
      <stop offset="100%" stop-color="#0F3D20"/>
    </linearGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF0A0"/>
      <stop offset="50%"  stop-color="#D4A828"/>
      <stop offset="100%" stop-color="#7A5808"/>
    </linearGradient>

    <filter id="sh" x="-12%" y="-8%" width="136%" height="136%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.6"/>
    </filter>

  </defs>

  <!-- ── V LEFT ARM ── bold triangle, same as reference -->
  <path d="M 5,8 L 38,8 L 50,80 Z"
        fill="url(#g)" filter="url(#sh)"/>
  <path d="M 5,8 L 38,8 L 50,80 Z"
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linejoin="round"/>

  <!-- ── V RIGHT ARM (full triangle, P rides on top) ── -->
  <path d="M 62,8 L 95,8 L 50,80 Z"
        fill="url(#g)"/>
  <path d="M 62,8 L 95,8 L 50,80 Z"
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linejoin="round"/>

  <!-- ── P letterform overlaid on right arm ──
       Stem x=62→76, bowl radius=18 (diameter=36, y=8→44).
       evenodd counter punches the bowl's negative space.
       Same fill as arm so boundary between P and arm is invisible.     -->
  <path fill-rule="evenodd" d="
    M 62,8
    L 76,8
    A 18,18 0 0,1 76,44
    L 62,44
    Z
    M 76,15
    A 10,10 0 0,1 76,37
    Z
  " fill="url(#g)"/>
  <!-- Gold border on the P bowl arc only -->
  <path d="M 76,8 A 18,18 0 0,1 76,44"
        fill="none" stroke="url(#gold)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- ── ARROW: trends up-right through the P bowl ──
       Shaft: from inside bowl lower area diagonally to upper-right.
       Arrowhead: solid triangle at tip.                               -->
  <!-- Shaft -->
  <line x1="70" y1="39" x2="91" y2="6"
        stroke="url(#g)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Gold outline on shaft -->
  <line x1="70" y1="39" x2="91" y2="6"
        stroke="url(#gold)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Arrowhead triangle — tip at (95,1) -->
  <polygon points="95,1 86,14 93,17" fill="url(#g)"/>
  <polygon points="95,1 86,14 93,17"
           fill="none" stroke="url(#gold)" stroke-width="1" stroke-linejoin="round" opacity="0.6"/>

</svg>
