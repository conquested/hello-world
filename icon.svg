<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Money green gradient for the V body -->
    <linearGradient id="vGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#3A7D57"/>
      <stop offset="60%"  stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#112B1F"/>
    </linearGradient>

    <!-- Iridescent $100-ribbon gradient — blue → teal → gold → copper → blue -->
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="14%"  stop-color="#0097A7"/>
      <stop offset="28%"  stop-color="#00BFA5"/>
      <stop offset="42%"  stop-color="#D4AF37"/>
      <stop offset="56%"  stop-color="#C07830"/>
      <stop offset="70%"  stop-color="#00ACC1"/>
      <stop offset="85%"  stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#C5A028"/>
    </linearGradient>

    <!-- Clip the ribbon to the V shape so it looks embedded -->
    <clipPath id="vClip">
      <path d="M12,6 L30,6 L50,84 L70,6 L88,6 L50,93 Z"/>
    </clipPath>

    <!-- Soft glow for ribbon -->
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- V body -->
  <path d="M12,6 L30,6 L50,84 L70,6 L88,6 L50,93 Z" fill="url(#vGrad)"/>

  <!-- Iridescent ribbon clipped inside the V -->
  <rect x="-8" y="33" width="116" height="14" rx="1.5"
        fill="url(#ribbon)" opacity="0.93"
        transform="rotate(-7, 50, 40)"
        clip-path="url(#vClip)"
        filter="url(#glow)"/>

  <!-- Gold outline on V edges -->
  <path d="M12,6 L30,6 L50,84 L70,6 L88,6 L50,93 Z"
        fill="none" stroke="#C9A84C" stroke-width="1.4" stroke-linejoin="round" opacity="0.65"/>

  <!-- Subtle inner highlight (left arm top edge) -->
  <line x1="12" y1="6" x2="30" y2="6" stroke="#A8D5B5" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="6" x2="88" y2="6" stroke="#A8D5B5" stroke-width="1" opacity="0.4"/>
</svg>
