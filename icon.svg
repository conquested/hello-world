<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>

    <linearGradient id="armGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#52C878"/>
      <stop offset="60%"  stop-color="#237A42"/>
      <stop offset="100%" stop-color="#0F3D20"/>
    </linearGradient>

    <linearGradient id="goldG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF0A0"/>
      <stop offset="40%"  stop-color="#D4A828"/>
      <stop offset="100%" stop-color="#7A5808"/>
    </linearGradient>

    <filter id="shadow" x="-15%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.75"/>
    </filter>

    <filter id="bevel" x="-5%" y="-5%" width="115%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="4" specularConstant="1.2"
                          specularExponent="12" lighting-color="#ffffff" result="spec">
        <fePointLight x="30" y="-20" z="80"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specClip"/>
      <feBlend in="SourceGraphic" in2="specClip" mode="screen"/>
    </filter>

  </defs>

  <!-- Shadow layer -->
  <path d="M 7,5 L 44,5 L 50,95 Z  M 56,5 L 93,5 L 50,95 Z"
        fill="#000" opacity="0.55" transform="translate(2,5)"/>

  <!-- Left arm -->
  <path d="M 7,5 L 44,5 L 50,95 Z"
        fill="url(#armGrad)" filter="url(#shadow)"/>

  <!-- Right arm -->
  <path d="M 56,5 L 93,5 L 50,95 Z"
        fill="url(#armGrad)" filter="url(#shadow)"/>

  <!-- Gold border — left arm -->
  <path d="M 7,5 L 44,5 L 50,95 Z"
        fill="none" stroke="url(#goldG)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Gold border — right arm -->
  <path d="M 56,5 L 93,5 L 50,95 Z"
        fill="none" stroke="url(#goldG)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner bevel highlight — left arm -->
  <path d="M 10,9 L 40,9 L 49,90 Z"
        fill="none" stroke="#ffffff" stroke-width="0.8" stroke-linejoin="round" opacity="0.15"/>

  <!-- Inner bevel highlight — right arm -->
  <path d="M 60,9 L 90,9 L 51,90 Z"
        fill="none" stroke="#ffffff" stroke-width="0.8" stroke-linejoin="round" opacity="0.15"/>

  <!-- Top-edge sheen — left arm -->
  <line x1="9" y1="7" x2="42" y2="7" stroke="#A8F0C0" stroke-width="1.5" opacity="0.3"/>

  <!-- Top-edge sheen — right arm -->
  <line x1="58" y1="7" x2="91" y2="7" stroke="#A8F0C0" stroke-width="1.5" opacity="0.3"/>

</svg>
