<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budget Balancer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- Header -->
  <header>
    <div class="logo">Budget<span>Balancer</span></div>
    <div class="header-right">
      <button class="btn btn-primary" id="add-btn">+ Add Transaction</button>
    </div>
  </header>

  <!-- Summary Bar -->
  <div class="summary-bar">
    <div class="sum-card">
      <div class="sum-label">Monthly Income</div>
      <div class="sum-value income-color" id="sum-income">$0.00</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Monthly Expenses</div>
      <div class="sum-value expense-color" id="sum-expenses">$0.00</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Balance</div>
      <div class="sum-value positive" id="sum-balance">$0.00</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Spending Rate</div>
      <div class="spend-bar-wrap"><div class="bar-fill" id="spend-bar-fill" style="width:0%"></div></div>
      <div class="spend-rate" id="spend-rate">0% of income spent</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Calendar -->
    <div class="calendar-section">
      <div class="cal-nav">
        <div class="cal-nav-btns">
          <button class="btn btn-ghost btn-sm" id="prev-month">&#8249;</button>
          <button class="btn btn-ghost btn-sm" id="today-btn">Today</button>
          <button class="btn btn-ghost btn-sm" id="next-month">&#8250;</button>
        </div>
        <h2 id="month-label">Month Year</h2>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">

      <!-- Transactions -->
      <div class="panel">
        <div class="panel-title">Transactions</div>
        <div class="tx-list-wrap">
          <div id="tx-list"></div>
        </div>
      </div>

      <!-- Analysis -->
      <div class="panel">
        <div id="analysis-panel"></div>
      </div>

    </div>
  </div>

</div>

<!-- Add/Edit Transaction Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Add Transaction</h2>
    </div>
    <form class="modal-body" id="modal-form">
      <div class="form-group">
        <label class="form-label" for="modal-category">Category</label>
        <select class="form-select" id="modal-category"></select>
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-amount">Amount ($)</label>
        <input class="form-input" id="modal-amount" type="number" min="0.01" step="0.01" placeholder="0.00" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-desc">Description (optional)</label>
        <input class="form-input" id="modal-desc" type="text" placeholder="e.g. Netflix, Whole Foods..." maxlength="80" />
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-date">Date</label>
        <input class="form-input" id="modal-date" type="date" required />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger btn-sm" id="modal-delete-btn" style="display:none">Delete</button>
        <div class="right">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
